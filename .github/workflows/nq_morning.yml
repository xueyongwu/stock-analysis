name: nq-morning

on:
  schedule:
    - cron: "45 0 * * 1-5"  # UTC 0:45 = 北京 8:45; cron 常延迟 10-20 分钟, 实际 ~9:00-9:15 落地, A股开盘前出隔夜纳指
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas pyarrow requests
      - run: python nq_overnight.py
      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nq_data.js cache/nq_min.parquet
          git diff --cached --quiet || git commit -m "chore: nq morning update $(date -u +%F)"
          git pull --rebase
          git push
