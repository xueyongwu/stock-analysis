name: daily-update

on:
  schedule:
    - cron: "0 10 * * 1-5"  # UTC 10:00 = 北京 18:00, 工作日; baostock 当日数据 ~17:30 后可用
  workflow_dispatch:          # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install baostock pandas pyarrow
      - run: python median_trend.py --update
      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js cache/daily_pctchg.parquet
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +%F)"
          git pull --rebase
          git push
