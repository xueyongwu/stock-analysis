name: daily-update

on:
  schedule:
    - cron: "0 10 * * 1-5"  # UTC 10:00 = 北京 18:00, 工作日; baostock 当日数据 ~17:30 后可用
  workflow_dispatch:          # 手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install baostock pandas pyarrow akshare
      - run: python median_trend.py --update
      - run: python intraday_cache.py 159696
        continue-on-error: true  # 新浪接口偶发失败不阻断中位数更新
      - run: python index_perf.py
        continue-on-error: true  # 指数源(新浪/中证/同花顺)偶发失败不阻断, 页面用旧数据
      - run: python nq_overnight.py
        continue-on-error: true  # 新浪外盘接口偶发失败不阻断, 页面用旧数据
      - name: commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js etf_data.js idx_data.js nq_data.js cache/daily_pctchg.parquet cache/intraday_159696_1min.parquet cache/nq_min.parquet
          git diff --cached --quiet || git commit -m "chore: daily data update $(date -u +%F)"
          git pull --rebase
          git push
